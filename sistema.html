<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Panel del sistema</h1>
    <nav>
        <a href="index.html">Inicio</a>
    </nav>
</header>

<section class="form-container">
    <h2>Captura de datos</h2>
    <form>
        <input type="text" placeholder="Nombre">
        <input type="text" placeholder="Edad">
        <input type="text" placeholder="Ciudad">
        <button>Guardar</button>
    </form>
</section>

<section class="tabla">
    <h2>Datos registrados</h2>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Ciudad</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Juan</td>
                <td>22</td>
                <td>CDMX</td>
            </tr>
            <tr>
                <td>Ana</td>
                <td>25</td>
                <td>Toluca</td>
            </tr>
        </tbody>
    </table>
</section>

</body>
</html>
